  <script>
    (function () {
      var app = document.getElementById('app');
      if (!app) return;
      function pagePath() {
        var rawHash = String(window.location.hash || '').replace(/^#/, '');
        if (rawHash && rawHash.charAt(0) !== '/') rawHash = '/' + rawHash;
        return rawHash || '/';
      }
      function shell(kind, title, lead, cards, extra) {
        var cardCount = cards || 3;
        var cardHtml = new Array(cardCount).fill('<div class="route-prepaint-card"></div>').join('');
        return '<section class="route-prepaint' + (kind === 'tight' ? ' route-prepaint-tight' : '') + '">' +
          '<div class="route-prepaint-heading">' +
          '<div class="route-prepaint-pill"></div>' +
          '<div class="route-prepaint-line lg wide"></div>' +
          '<div class="route-prepaint-line lg md"></div>' +
          '<div class="route-prepaint-line wide"></div>' +
          (lead ? '<div class="route-prepaint-line md"></div>' : '') +
          '</div>' +
          (extra || '') +
          '<div class="route-prepaint-cards">' + cardHtml + '</div>' +
          '</section>';
      }
      function heroShell() {
        return '<section class="route-prepaint">' +
          '<div class="route-prepaint-hero">' +
          '<div class="route-prepaint-copy">' +
          '<div class="route-prepaint-pill"></div>' +
          '<div class="route-prepaint-line lg wide"></div>' +
          '<div class="route-prepaint-line lg md"></div>' +
          '<div class="route-prepaint-line wide"></div>' +
          '<div class="route-prepaint-line md"></div>' +
          '<div class="route-prepaint-btns"><div class="route-prepaint-btn"></div><div class="route-prepaint-btn secondary"></div></div>' +
          '<div class="route-prepaint-stats"><div class="route-prepaint-stat"></div><div class="route-prepaint-stat"></div><div class="route-prepaint-stat"></div></div>' +
          '</div>' +
          '<div class="route-prepaint-panel"><div class="route-prepaint-pill"></div><div class="route-prepaint-media"></div><div class="route-prepaint-line wide"></div><div class="route-prepaint-line sm"></div></div>' +
          '</div>' +
          '<div class="route-prepaint-cards"><div class="route-prepaint-card"></div><div class="route-prepaint-card"></div><div class="route-prepaint-card"></div></div>' +
          '</section>';
      }
      function formShell() {
        return '<section class="route-prepaint route-prepaint-tight"><div class="route-prepaint-simple"><div class="route-prepaint-block">' +
          '<div class="route-prepaint-pill"></div><div class="route-prepaint-line lg wide"></div><div class="route-prepaint-line md"></div>' +
          '<div class="route-prepaint-form"><div class="route-prepaint-field"></div><div class="route-prepaint-field"></div><div class="route-prepaint-field wide"></div></div>' +
          '<div class="route-prepaint-btns"><div class="route-prepaint-btn"></div></div>' +
          '</div></div></section>';
      }
      function detailShell() {
        return '<section class="route-prepaint"><div class="route-prepaint-hero">' +
          '<div class="route-prepaint-panel"><div class="route-prepaint-media" style="min-height:420px"></div></div>' +
          '<div class="route-prepaint-copy"><div class="route-prepaint-pill"></div><div class="route-prepaint-line lg wide"></div><div class="route-prepaint-line lg sm"></div><div class="route-prepaint-line wide"></div><div class="route-prepaint-line md"></div><div class="route-prepaint-btns"><div class="route-prepaint-btn"></div><div class="route-prepaint-btn secondary"></div></div></div>' +
          '</div><div class="route-prepaint-cards"><div class="route-prepaint-card"></div><div class="route-prepaint-card"></div><div class="route-prepaint-card"></div></div></section>';
      }
      function simpleShell() {
        return '<section class="route-prepaint route-prepaint-tight"><div class="route-prepaint-simple"><div class="route-prepaint-block">' +
          '<div class="route-prepaint-pill"></div><div class="route-prepaint-line lg wide"></div><div class="route-prepaint-line wide"></div><div class="route-prepaint-line md"></div>' +
          '<div class="route-prepaint-stack"><div class="route-prepaint-mini"><div class="route-prepaint-line wide"></div><div class="route-prepaint-line sm"></div></div><div class="route-prepaint-mini"><div class="route-prepaint-line wide"></div><div class="route-prepaint-line sm"></div></div></div>' +
          '</div></div></section>';
      }
      var path = pagePath();
      if (path === '/' || path === '') {
        app.innerHTML = heroShell();
      } else if (/^\/products\/?$/.test(path) || /^\/articles\/?$/.test(path) || /^\/reviews\/?$/.test(path)) {
        app.innerHTML = shell('', '', true, 6);
      } else if (/^\/calc\/?$/.test(path)) {
        app.innerHTML = shell('tight', '', true, 4, '<div class="route-prepaint-grid cols-4"><div class="route-prepaint-mini"><div class="route-prepaint-line wide"></div><div class="route-prepaint-line sm"></div></div><div class="route-prepaint-mini"><div class="route-prepaint-line wide"></div><div class="route-prepaint-line sm"></div></div><div class="route-prepaint-mini"><div class="route-prepaint-line wide"></div><div class="route-prepaint-line sm"></div></div><div class="route-prepaint-mini"><div class="route-prepaint-line wide"></div><div class="route-prepaint-line sm"></div></div></div>');
      } else if (/^\/line-room\//.test(path)) {
        app.innerHTML = formShell();
      } else if (/^\/(login|register|checkout)\/?$/.test(path)) {
        app.innerHTML = formShell();
      } else if (/^\/(account|track|about|wishlist)\/?$/.test(path) || /^\/order\//.test(path)) {
        app.innerHTML = simpleShell();
      } else if (/^\/(product|article|crops)\//.test(path)) {
        app.innerHTML = detailShell();
      } else {
        app.innerHTML = simpleShell();
      }
    })();
  </script>
