  <link rel="stylesheet" href="/styles.css?v=7623386fdc" />
  <style>
    .admin-boot-shell { opacity: 1; }
    .admin-boot-shell .admin-main { display: grid; gap: 22px; }
    .admin-boot-panel {
      border-radius: 30px;
      border: 1px solid rgba(40, 30, 90, 0.10);
      background: rgba(255, 255, 255, 0.86);
      min-height: 220px;
      padding: 24px;
    }
    .admin-boot-chart { min-height: 280px; }
    .admin-boot-line,
    .admin-boot-pill {
      display: block;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(123,92,255,.08), rgba(123,92,255,.16), rgba(123,92,255,.08));
      background-size: 200% 100%;
      animation: adminBootPulse 1.25s ease-in-out infinite;
    }
    .admin-boot-line { height: 14px; }
    .admin-boot-pill { height: 10px; }
    .admin-boot-title { width: 180px; margin-bottom: 20px; }
    .admin-boot-sub { width: 120px; opacity: .7; }
    .admin-boot-chart .admin-boot-line { margin-bottom: 18px; }
    .admin-boot-chart .admin-boot-line:last-child { margin-bottom: 0; }
    .admin-boot-nav { display: grid; gap: 10px; margin-top: 16px; }
    .admin-boot-nav .admin-boot-pill:nth-child(1) { width: 86%; }
    .admin-boot-nav .admin-boot-pill:nth-child(2) { width: 72%; }
    .admin-boot-nav .admin-boot-pill:nth-child(3) { width: 78%; }
    .admin-boot-nav .admin-boot-pill:nth-child(4) { width: 64%; }
    .admin-boot-nav .admin-boot-pill:nth-child(5) { width: 82%; }
    .admin-boot-nav .admin-boot-pill:nth-child(6) { width: 69%; }
    .admin-boot-nav .admin-boot-pill:nth-child(7) { width: 76%; }
    .admin-boot-nav .admin-boot-pill:nth-child(8) { width: 58%; }
    @keyframes adminBootPulse {
      0% { background-position: 0% 50%; opacity: .7; }
      50% { background-position: 100% 50%; opacity: 1; }
      100% { background-position: 0% 50%; opacity: .7; }
    }
  </style>
</head>
